# ─── Captured beats (post-original-design) ───
captured-beats:
  - date: 2026-05-03
    topic: wat-cli ships wat-repl by default — "help just works" property
    triggered-by: |
      User direction (extending the original arc-opening direction):

      > "further... wat-repl needs to be depended on by wat-cli ....
      > when a user compiles their own 'my-wat-cli' they can have
      > the repl be used with whatever symbols their project
      > created.. so help /just works/ in their env"

    captured: |
      LOAD-BEARING UX PROPERTY — ZERO EXTRA SETUP:

      The wat-cli architecture (arcs 099/100/101 of wat-rs proper)
      lets each user compile their own `my-wat-cli` with their
      batteries. By having wat-cli ship wat-repl + wat-help as
      DEFAULT batteries, users get interactive help against their
      own symbols without any extra registration:

        $ my-wat-cli repl
        my-wat-cli> (:wat::help :my-app::transfer-funds)
        ;; → formatted EDN of THEIR function definition

      The help reflects the user's frozen symbol table (wat-rs core
      + their batteries). No special configuration; no opt-in
      registration; help "just works" because the cli already
      built it in.

      WHY THIS IS LOAD-BEARING:

      Without this property, wat-help is a library that users must
      manually wire up — friction at exactly the moment the user
      most wants help (mid-task, at the REPL, debugging). The
      whole point of help is "ask the running program what it
      knows about itself" — that ask must be one form away, not
      five lines of setup.

      With this property, every wat-cli user gets the same
      surface for free. Consistent behavior across user
      applications; consistent learning curve; the discipline
      the substrate gives them at no cost.

      DEPENDENCY CASCADE UPDATED:

      The full chain is now:

        wat-cli (per-user compiled; arcs 099/100/101)
          ↓ default batteries include
        wat-repl (arc 012)
          ↓ depends on
        wat-help (THIS ARC)
          ↓ depends on
        wat-fmt (arc 003)
          + wat-rs reflection primitives (arc 109)

      Arc 012 (wat-repl) needs a captured-beat noting:
      - It depends on wat-help (per the original arc-opening
        direction this conversation)
      - It is consumed by wat-cli as a default battery (per this
        captured-beat's direction)

      Slice 5 of this arc's SLICE-PLAN is dedicated to verifying
      the "just works" property end-to-end.

    docs-updated:
      - README.md: dep chain extended with wat-cli at the top;
        "just works" property documented
      - DESIGN.md: new "Integration with wat-cli" section with
        sketch of how user batteries integrate
      - SLICE-PLAN.md: slice 5 dedicated to the "just works"
        verification (the load-bearing UX win)

    cross-references:
