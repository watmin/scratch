# Scratch arc — wat-help: runtime reflection (:wat::help :sym -> :String)
#
# Foundation-tier crate. Sits between wat-fmt (formatter) and
# wat-repl (interactive). Provides the canonical "tell me about
# this symbol" surface for every interactive consumer (repl;
# pause; mcp; future tutor / autocomplete / LSP).

arc:
  slug: wat-help
  date: 2026-05-03
  triggered-by: |
    User direction (during the wat-rs reflection-primitives work):

    > "we are working through reflection primitives now... i think
    > we need a wat-help who provides the form (:wat::help
    > :some-symbol) -> entire form-as-edn
    >
    > this ret val.. help should depend on wat-fmt and repl should
    > depend on help
    >
    > when we run (:wat::help :some-symbol) we get a pretty
    > formatted edn str based on wat-fmt's rules?.. the user is
    > presented with a digestable form that's hopefully useful?..."

  outcome: |
    Arc opened. Foundation-tier crate; the dep chain locked per
    user direction.

    LOCKED:
    - Name: wat-help (universal noun; matches Python/Ruby/Clojure
      idioms; gaze-approved)
    - Form: (:wat::help :sym) -> :String — formatted EDN of the
      symbol's full reflection surface
    - Dep chain (per user direction):
        wat-pause → wat-repl → wat-help → wat-fmt
        wat-help ALSO depends on wat-rs reflection primitives
        (arc 109's in-progress work)
    - Output discipline: the returned EDN is the SYMBOL'S FORM
      formatted via wat-fmt rules. No editorial synthesis. What
      you see is what the substrate has.
    - Foundation-tier crate at wat-rs/crates/wat-help/ per
      arc-013 pattern; small scope; sharply scoped.

    THE LOAD-BEARING ARGUMENT:

    Reflection-formatting is its own concern. Living inside repl
    forces unrelated consumers (MCP tools; tutoring; autocomplete;
    pause sessions; future LSP server) to depend on the whole repl
    machinery. Pulling it into a foundation-tier crate gives every
    interactive consumer the same surface.

    Per the four questions:
    - Obvious  ✅✅ — `(:wat::help :sym)` matches user expectations
                       from every language; "help" is universal
    - Simple   ✅   — one function; small crate; clear deps
    - Honest   ✅✅ — output IS the form (round-trip-able through
                       wat-fmt); no editorial synthesis
    - Good UX  ✅✅ — repl users land naturally; pause sessions get
                       instant help; agents-via-MCP get typed
                       reflection

    Could be ✅✅✅ Honest if the returned EDN is structurally
    identical to what wat-fmt would produce on the source — i.e.,
    no editorial synthesis; just the actual form-as-stored
    formatted consistently. Worth confirming in slice planning.

    Slice plan depends on arc 109's reflection primitives; sized
    conservatively.

