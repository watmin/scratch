# Scratch arc — wat-http-serve: minimal HTTP handler interface
#
# Ruby Rack equivalent for wat. Sits on top of tokio + hyper;
# exposes a minimal handler signature; everything composes from
# it. Foundation for arc 010 (wat-http-route, the Sinatra
# equivalent).

arc:
  slug: wat-http-serve
  date: 2026-05-03
  triggered-by: |
    User direction:

    > "i think we need to model something like a ruby rack for
    > an http server.... we should probaly build on top of
    > tokio?... a tokio router or whatever can be expressed in
    > wat and then wat can take over to do serving.. we just
    > build on top of the rock solid http layer the rust
    > ecosystem brings?...
    >
    > i /really/ like the ruby rack http interface solution....
    > elegance..
    >
    > i think we can also build something like a sinatra on top
    > of it?.. those two pair so well..."

    User direction on naming after applying /gaze:

    > "i think we must name them http.... serve could collide
    > with... anything.. and route... also collidable..
    > wat-http-serve and wat-http-route feel good?.."

  outcome: |
    Two arcs opened (009 + 010). This arc (009) is the
    foundation: the minimal handler interface specification.

    LOCKED:
    - Name: wat-http-serve (gaze-approved; http- prefix
      prevents collision; serve verb describes what it enables)
    - Layering: Rust shim with tokio+hyper at Layer 2; wat-side
      handler interface at Layer 3
    - Architecture: One handler signature
      (:Request -> :Result<:Response, :HandlerError>);
      middleware are handler-wrappers; composition is function
      composition (Rack-elegant)

    Application-tier arc; not foundation tier. Depends on
    RemoteProgram's wire protocol decisions being firm enough
    (Q-channel, EDN format, error taxonomy) that wat-http-serve
    can either expose plain REST or the wat-wire format
    natively.

    Slice plan not yet sized; design firms up via chat
    iteration.

conventions:
  - filenames: kebab-case .md / UPPER-SNAKE.md for arc roles
  - same shape as 003-008 (README/INDEX/DESIGN/SLICE-PLAN)
  - capture user's verbatim direction at decision points
  - inherit conventions from prior arcs (four questions,
    arc-013 crate pattern, etc.)

# ─── Files in this arc ───
notes:
  - file: README.md
    captured: 2026-05-03
    role: orientation
    summary: |
      Top-level pointer. What wat-http-serve is (Rack analog),
      the four-layer architecture, where it lives
      (wat-rs/crates/wat-http-serve/), reading order,
      cross-references to arc 010 + RemoteProgram + wat-kwargs +
      WAT-NETWORK deployment.

  - file: DESIGN.md
    captured: 2026-05-03
    role: architecture
    summary: |
      Architecture in detail: the Rack-style minimal handler
      interface; Rust shim with tokio+hyper for Layer 2; wat-side
      handler signature, middleware as handler-wrappers,
      Request/Response types, error model. Connection to
      wat-network deployment (istio sidecar in front; wat-http-serve
      app does signed payload validation behind it). Connection
      to Q-channel (this arc's wire protocol can be plain REST OR
      the wat-wire Ok/Err format).

# ─── State ───
status: open (sketch; design firms up via chat)
# Bar to graduate to a real wat-rs arc:
#   1. RemoteProgram (007) has answered enough of its open
#      questions that the wire protocol decisions are firm
#   2. wat-fmt slice 1 has shipped (so the established
#      crate-shipping pattern is real)
#   3. User signals "let's start"

