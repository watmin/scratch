  - date: 2026-05-03
    topic: three calling conventions; one validation engine; hash-map composability locked
    triggered-by: |
      Continuation of the two-form refinement above. User direction:

      > "it must be - but we also need to allow the users to compose
      > their ordering.. kwargs must not be strongly coupled to the
      > positional defs.. being able to compose the kwargs as a
      > hash-map and then use the hash-map to invoke the func is the
      > UX we want to chase... think on how clojure does kwargs...
      > i want something adjacent to this"

      [User wrote "map" in the original message — corrected to
      "hash-map" per the documentation discipline they articulated
      in the same thread:

      > "in our docs.. we are dilligent about hash-map != map .. don't
      > name error error.. i used it loosely as well..
      > kwargs => hash-map of symbol->something
      > map => apply function to list of things"

      Quoted with the corrected term to match the discipline; the
      user flagged that they too used "map" loosely in the moment.]

    captured: |
      THREE CALLING CONVENTIONS — one validation engine

      Lock-in on the structural-Honest property: ✅✅✅ Honest is
      REQUIRED, not optional. The kwargs surface MUST type-enforce
      structurally identically to the positional. The mechanism:

      All calling conventions converge on the SAME underlying
      validated function. Surfaces are arrangement-only.

      Convention 1 — POSITIONAL (fast path; order-dependent):

        (:transfer-funds-positional account-a account-b 500 "lunch")

      Convention 2 — INLINE KWARGS (named at the call site):

        (:transfer-funds
          :from   account-a
          :to     account-b
          :amount 500
          :memo   "lunch")

      Convention 3 — HASH-MAP KWARGS (the composability target):

        (:wat::core::let*
          (((args :HashMap<Symbol,HolonAST>)
             (:wat::core::HashMap :(Symbol,HolonAST)))
           ((args :HashMap<Symbol,HolonAST>)
             (:wat::core::assoc args :from account-a))
           ((args :HashMap<Symbol,HolonAST>)
             (:wat::core::assoc args :to account-b))
           ((args :HashMap<Symbol,HolonAST>)
             (:wat::core::assoc args :amount 500)))
          (:transfer-funds args))

        ;; Note the canonical wat-core syntax:
        ;; - :wat::core::HashMap is the PascalCase TYPE FQDN
        ;; - construction takes a tuple-type :(K,V) for the kv types
        ;; - :wat::core::assoc adds entries; returns a new HashMap
        ;; - per wat-rs/docs/USER-GUIDE.md, the "core collections"
        ;;   are HashMap, HashSet, Vec; verbs are assoc/dissoc/get/
        ;;   contains?/keys/values/empty?/length

      All three converge on ONE type-check engine. The kwargs and
      hash-map surfaces unpack their inputs and call the same
      validated function. You CANNOT construct a call via
      Convention 2 or 3 that bypasses any check Convention 1
      enforces — they all flow through the same gate.

      THIS IS WHAT EARNS ✅✅✅ HONEST STRUCTURALLY.

      THE HASH-MAP COMPOSABILITY WIN:

      Convention 3 unlocks the patterns Clojure made canonical.
      Examples below use the verbs wat-core actually exposes
      (assoc, dissoc, get, contains?). Substrate gap noted below
      where a primitive is needed but doesn't yet exist.

        ;; Modify args in pipeline (assoc chain via let*)
        (:wat::core::let*
          (((base-args :HashMap<Symbol,HolonAST>) (:get-default-args))
           ((with-from :HashMap<Symbol,HolonAST>)
             (:wat::core::assoc base-args :from new-account))
           ((final     :HashMap<Symbol,HolonAST>)
             (:wat::core::assoc with-from :amount 200)))
          (:transfer-funds final))

        ;; Higher-order: function that prepares args
        (:wat::core::define
          (:prepare-transfer (user :User) (amount :i64)
            -> :HashMap<Symbol,HolonAST>)
          (:wat::core::let*
            (((m :HashMap<Symbol,HolonAST>)
               (:wat::core::HashMap :(Symbol,HolonAST)))
             ((m :HashMap<Symbol,HolonAST>)
               (:wat::core::assoc m :from (:User/account user)))
             ((m :HashMap<Symbol,HolonAST>)
               (:wat::core::assoc m :to :treasury))
             ((m :HashMap<Symbol,HolonAST>)
               (:wat::core::assoc m :amount amount)))
            m))
        (:transfer-funds (:prepare-transfer current-user 500))

        ;; Conditional construction (assoc-on-condition)
        (:wat::core::let*
          (((args :HashMap<Symbol,HolonAST>) (:base-args a b n))
           ((args :HashMap<Symbol,HolonAST>)
             (:wat::core::if include-memo?
               (:wat::core::assoc args :memo "scheduled")
               args)))
          (:transfer-funds args))

      The hash-map is just data. Data composes. Data flows through
      pipelines. Once the kwargs are a hash-map, the call site is
      a first-class object that can be manipulated like anything
      else.

      MERGE — what it actually is (sharpened by user 2026-05-03):

        > "what is merge here.. is this just a foldl expr?..."

      Yes. Merge is NOT a substrate primitive — it's a composition
      of (foldl + keys + get + assoc), all of which wat-core already
      ships. The framing of "missing primitive" was wrong; it's a
      missing stdlib helper.

      The shape:

        ;; Binary merge: fold over b's keys, assoc into a
        (:wat::core::define
          (:my-merge<K,V> (a :HashMap<K,V>) (b :HashMap<K,V>)
            -> :HashMap<K,V>)
          (:wat::core::foldl
            a
            (:wat::core::keys b)
            (:wat::core::lambda
              ((acc :HashMap<K,V>) (k :K))
              (:wat::core::match (:wat::core::get b k)
                ((:Some v) (:wat::core::assoc acc k v))
                (:None     acc)))))   ; impossible — k from b's keys

        ;; Multi-merge (3+ maps; later overrides): foldl of binary
        (:wat::core::define
          (:my-merge-many<K,V> (maps :Vec<HashMap<K,V>>)
            -> :HashMap<K,V>)
          (:wat::core::match maps
            (:[]              (:wat::core::HashMap :(K,V)))
            (:[first ...rest]
              (:wat::core::foldl first rest :my-merge<K,V>))))

      Two layers, both folds. Inner: fold over one map's keys.
      Outer: fold over the list of maps with the binary merge.

      The substrate parts that exist (per wat-rs USER-GUIDE):
      - :wat::core::foldl  — left fold over Vec<T>
      - :wat::core::keys   — HashMap<K,V> -> Vec<K>  (arc 058)
      - :wat::core::get    — HashMap lookup -> Option<V>
      - :wat::core::assoc  — HashMap entry add -> new HashMap
      - :wat::list::reduce — already aliases foldl

      PLACEHOLDER (per user direction 2026-05-03):

        > "this is a to do... arc 109 will address this..
        > leave me a placeholder in this doc..."

      Arc 109 (the wat-rs mass-rewrite arc the user is grinding on)
      will likely ship a stdlib merge helper on top of the existing
      primitives — `:wat::map::merge` or `:wat::list::merge` or
      whatever the substrate's stdlib taxonomy lands on. ~5 lines
      of wat; not a substrate addition.

      Until then:
      (a) wait for arc 109's stdlib helper, OR
      (b) wat-kwargs slice 1 ships its own ~5-line merge helper
          on top of foldl + keys + get + assoc, OR
      (c) callers compose via repeated assoc directly

      DO NOT pretend merge is unavailable — track it as a known
      stdlib helper that gets authored in 109 (or sooner if
      wat-kwargs needs it before 109 ships). The substrate parts
      are all there.

      THE "NOT STRONGLY COUPLED TO POSITIONAL DEFS" PRINCIPLE:

      The hash-map convention is FIRST-CLASS, not derived. The
      kwargs aren't "positional args that happen to be named";
      they're a calling convention with their own composability
      properties. The positional form is one of three peers,
      not the primary shape.

      Implications for design:
      - Kwarg name doesn't need to match positional argument name
        — they happen to align by default; renaming allowed at
        definition time if the kwargs surface reads better
      - Defaults belong in the kwargs definition (per-kwarg
        :default <value>); positional missing-arg handling is
        separate
      - Optional kwargs (:optional :string) work without forcing
        positional form to track Option types
      - Hash-map can carry EXTRA keys the function ignores OR
        rejects — controllable via :strict? / :open? flag at
        definition time

      CLOJURE PARALLEL:

      Clojure's `& {:keys [...] :or {...} :as m}` destructuring
      shape became canonical for option-bag functions because
      it gives named-args ergonomics AND hash-map composability
      without choosing.

      Clojure 1.11+ unified the two further — a function can be
      called with EITHER inline keyword pairs OR a single trailing
      hash-map; both work. wat-kwargs targets this same
      unification.

      PER THE FOUR QUESTIONS (locked):

      - Obvious   ✅✅  — three conventions; named clearly;
                          hash-map is just a hash-map
      - Simple    ✅    — one type-check engine; surfaces are
                          arrangement-only
      - Honest    ✅✅✅ — structural impossibility of bypass; all
                          surfaces flow through the same gate; the
                          hash-map surface IS the call expression
                          as data — REQUIRED, locked
      - Good UX   ✅✅  — hash-map composability unlocks every
                          functional pattern; works for one-off
                          calls AND programmatic call construction

    docs-updated:
      - INDEX.yaml: this captured-beat (extends the previous
        2026-05-03 beat on two forms with three conventions +
        hash-map first-class)

    documentation-discipline:
      Per user direction this conversation:

        "in our docs.. we are dilligent about hash-map != map ..
        don't name error error..
        kwargs => hash-map of symbol->something
        map => apply function to list of things"

