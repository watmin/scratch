# Scratch arc — wat-http-api-client: spec-driven typed client SDK
#
# Opinionated layer above wat-http-client. Consumes a
# wat-http-api-spec; auto-generates typed call functions per
# operation. User calls them; substrate handles serialization,
# transport, validation. Same spec as the server side; structural
# drift impossible.

arc:
  slug: wat-http-api-client
  date: 2026-05-03
  triggered-by: |
    User direction (sibling to arcs 014/015):

    > "wat-http-api-client => consumes a user's api-spec definitions
    > and uses the for input+output scheme validation -- deps on
    > http-client, user-api-spec (transitive wat-scheme)"

    > "the spec enables both server and client to bootstrap"

    > "define your input/output shapes, decorate them with options
    > and paths, auto shove routes when obseving these and then the
    > client does the same... the spec enables both server and
    > client to bootstrap"

  outcome: |
    Arc opened (one of three: 014/015/016).

    LOCKED:
    - Name: wat-http-api-client (matches api-* family; api-
      prefix differentiates from bare wat-http-client)
    - Opinionated typed-SDK generator above wat-http-client; opt-in
    - Reads a Spec value at compile time; iterates operations;
      generates a typed call function per operation
    - Call function signatures: input shape → :Result<output, errors>
    - Input shape constructors enforce validity (the typed
      constructor literally can't produce invalid input)
    - Output deserialization + validation (both per spec output)
    - Error variant decoding (typed; exhaustive)
    - Auth header injection (per operation's :auth declaration)
    - Path interpolation (path params plug into URL)
    - NO retries by default (per failure-engineering — caller
      decides; arc 011 position holds here)

    Dependencies:
    - wat-http-api-spec (arc 014) — the contract; hard dep
    - wat-http-client (arc 011) — outbound HTTP; hard dep
    - wat-schema (arc 013) — validation; transitive via spec

    Pairs with wat-http-api-server (arc 015) — same spec; different
    role. Together they earn the structural drift-impossibility
    property: server and client compile against the SAME Spec value;
    drift is unrepresentable.

    Slice plan not yet sized; design firms up via chat iteration.

conventions:
  - filenames: kebab-case .md / UPPER-SNAKE.md for arc roles
  - same shape as 003-015 (README/INDEX/DESIGN/SLICE-PLAN)
  - capture user's verbatim direction at decision points
  - inherit conventions from prior arcs

