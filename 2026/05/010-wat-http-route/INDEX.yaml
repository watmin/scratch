# Scratch arc — wat-http-route: HTTP routing DSL (Sinatra analog)
#
# Sinatra-style routing DSL on top of wat-http-serve (arc 009).
# Pure wat: route definitions compile to a wat-http-serve::Handler.
# No Rust code in this crate (pure wat-vm computation).

arc:
  slug: wat-http-route
  date: 2026-05-03
  triggered-by: |
    User direction:

    > "i /really/ like the ruby rack http interface solution....
    > elegance..
    >
    > i think we can also build something like a sinatra on top
    > of it?.. those two pair so well..."

    User direction on naming after applying /gaze:

    > "i think we must name them http.... serve could collide
    > with... anything.. and route... also collidable..
    > wat-http-serve and wat-http-route feel good?.."

  outcome: |
    Two arcs opened (009 + 010). This arc (010) is the
    consumer-facing DSL on top of arc 009.

    LOCKED:
    - Name: wat-http-route (gaze-approved; http- prefix prevents
      collision; pairs cleanly with wat-http-serve)
    - Layering: pure wat on top of wat-http-serve; no Rust code
      expected in this crate
    - Architecture: route definitions compile to a single
      wat-http-serve::Handler via pattern matching on
      Request.method × Request.path; path patterns; method
      dispatch; kwarg-based route declarations (arc 008
      dependency)
    - Honest layering: separate crate from wat-http-serve so
      bare-bones users don't pull in the DSL; future routing
      DSLs (Roda-equivalent etc.) can ship independently
      against the same wat-http-serve foundation

    Application-tier arc; depends on:
    - wat-http-serve (arc 009)
    - wat-kwargs (arc 008)

    Slice plan not yet sized; waits for arc 009 to firm up.

conventions:
  - filenames: kebab-case .md / UPPER-SNAKE.md for arc roles
  - same shape as 003-009 (README/INDEX/DESIGN/SLICE-PLAN)
  - capture user's verbatim direction at decision points
  - inherit conventions from prior arcs (four questions,
    arc-013 crate pattern, etc.)

# ─── Files in this arc ───
notes:
  - file: README.md
    captured: 2026-05-03
    role: orientation
    summary: |
      Top-level pointer. What wat-http-route is (Sinatra analog
      on top of arc 009), the DSL's shape, where it lives
      (wat-rs/crates/wat-http-route/, likely pure-wat crate),
      reading order, cross-references.

  - file: INDEX.yaml
    captured: 2026-05-03
    role: catalog
    summary: This file. Beat-by-beat capture and arc status.

  - file: DESIGN.md
    captured: 2026-05-03
    role: architecture
    summary: |
      DSL architecture: route table compilation, path pattern
      matching (`/users/:id` style), method dispatch, route ->
      handler composition. Kwarg-based syntax via arc 008.
      Compiled output is a single wat-http-serve::Handler.

  - file: SLICE-PLAN.md
    captured: 2026-05-03
    role: shipping plan
    summary: |
      Sketch slices: define-app primitive; path pattern matcher;
      method dispatch; subroute composition; integration with
      arc 009. Not sized; waits for arc 009 progress.

# ─── State ───
status: open (sketch; design firms up via chat)
# Bar to graduate to a real wat-rs arc:
#   1. arc 009 (wat-http-serve) has shipped slice 1 (or close)
#   2. arc 008 (wat-kwargs) has shipped its slice 1
#   3. User signals "let's start"

