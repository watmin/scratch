      (wat-rs/crates/wat-http-client/), reading order,
      cross-references to arc 009 + arc 007 + WAT-NETWORK.

  - file: INDEX.yaml
    captured: 2026-05-03
    role: catalog
    summary: This file. Beat-by-beat capture and arc status.

  - file: DESIGN.md
    captured: 2026-05-03
    role: architecture
    summary: |
      Architecture in detail: reqwest-based Rust shim, wat-side
