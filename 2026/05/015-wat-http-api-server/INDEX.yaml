# Scratch arc — wat-http-api-server: spec-driven server skeleton
#
# Opinionated middleware on top of wat-http-router. Consumes a
# wat-http-api-spec; auto-generates routes, validators, error
# responses, auth/rate-limit middleware. User implements only
# handler bodies.

arc:
  slug: wat-http-api-server
  date: 2026-05-03
  triggered-by: |
    User direction (sibling to arc 014):

    > "wat-http-api-server => consumes a user's api-spec definitions
    > and uses them for input+output scheme validation -- deps on
    > http-router, user-api-spec (transitive wat-schema,
    > wat-http-router)"

    > "the http server layer... it leverages the nature of the api
    > spec to auto generate routes and errors.. they are qualified
    > in the user's spec crate.."

    > "but its built on our sinatra-esque server, users can shim in
    > whatever middle way they want... the http-api stuff is just a
    > middleware for routes and validations"

  outcome: |
    Arc opened (one of three: 014/015/016).

    LOCKED:
    - Name: wat-http-api-server (matches api-* family; api-
      prefix differentiates from bare wat-http-server)
    - Opinionated middleware layer above wat-http-router; opt-in
    - Reads a Spec value at compile time; iterates operations;
      generates routes + validation + middleware
    - Handler signatures derived from spec; user implements only
      bodies
    - Consistent error envelope across all endpoints
    - Auto auth middleware per operation's :auth declaration
    - Auto rate-limit middleware per operation's :rate-limit
    - Auto cache headers per operation's :cacheable?
    - The user STILL writes handler bodies — substrate provides
      the paved road, user provides the business logic

    Dependencies:
    - wat-http-api-spec (arc 014) — the contract; hard dep
    - wat-http-router (arc 010) — routing primitive; hard dep
    - wat-schema (arc 013) — validation; transitive via spec
    - wat-http-server (arc 009) — bare handler interface;
      transitive via router

    Pairs with: wat-http-api-client (arc 016) — same spec;
    different role. Together they provide the structural
    drift-impossibility property.

    Slice plan not yet sized; design firms up via chat iteration.

conventions:
  - filenames: kebab-case .md / UPPER-SNAKE.md for arc roles
  - same shape as 003-014 (README/INDEX/DESIGN/SLICE-PLAN)
  - capture user's verbatim direction at decision points
  - inherit conventions from prior arcs

# ─── Files in this arc ───
notes:
  - file: README.md
    captured: 2026-05-03
    role: orientation
    summary: |
      Top-level pointer. What wat-http-api-server is (opinionated
      middleware on top of wat-http-router; consumes a spec;
      auto-generates everything boilerplate), how a user uses it
      (three crates: spec, server, client), the four-layer
      architecture, where it lives, cross-references.

  - file: INDEX.yaml
    captured: 2026-05-03
    role: catalog
    summary: This file. Beat-by-beat capture and arc status.

  - file: DESIGN.md
    captured: 2026-05-03
    role: architecture
    summary: |
      Architecture in detail: spec iteration, route generation
      via wat-http-router, validator wiring via wat-schema,
      middleware composition order, handler signature derivation,
      error envelope shape, auth taxonomy, rate-limit semantics.

  - file: SLICE-PLAN.md
    captured: 2026-05-03
    role: shipping plan
    summary: |
      Sketch slices: route generation; validator wiring; error
      envelope; auth middleware; rate-limit middleware; cache
      headers; production hardening.

# ─── State ───
status: open (sketch; design firms up via chat)
