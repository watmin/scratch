# Scratch arc — RemoteProgram: typed remote program calls in wat
#
# Last item from random-notes.txt's four-item list. Application-
# tier rather than foundation-tier (sits above the toolkit
# quartet). Design is in-progress; this arc captures locked
# decisions + open questions ready to be answered one-at-a-time.

arc:
  slug: remote-program
  date: 2026-05-03
  triggered-by: |
    User direction:

    > "alright.. RemoteProgram... there's tiers to this...
    >
    > unix domain
    > localhost http
    > remote https
    > remote mtls
    >
    > -- that's it - we don't allow clear text over the network
    >
    > i think we can model this right?..."

    > "the first one... edn is the transport protocol..."

    User direction on tempo:

    > "great questions - get them on disk .. i need to work
    > them one by one..."

  outcome: |
    Two decisions locked:

    1. THE FOUR-TIER MODEL. RemoteProgram supports exactly four
       transports: unix domain, localhost HTTP, remote HTTPS,
       remote mTLS. CONSPICUOUSLY ABSENT: remote HTTP. The
       no-clear-text-over-network invariant is enforced at the
       TYPE SYSTEM level — there's no constructor for
       remote-without-encryption. Honest by construction.

    2. WIRE FORMAT IS EDN. Length-prefixed EDN frames over the
       wire; round-trips through wat::edn::write / wat::edn::read.
       Same shape wat-edn already provides for other consumers.
       JSON via wat-edn for heterogeneous-server scenarios is
       implied but secondary.

    Seven design questions enumerated in DESIGN.md, ordered for
    one-at-a-time work:

    Q8 — Who is the first consumer? (grounds everything)
    Q1 — Transport-as-config vs transport-as-type
    Q2 — Connection model: persistent or per-call
    Q4 — Server side scope (do we ship `serve` in v1?)
    Q5 — Streaming sibling vs included
    Q6 — Error taxonomy: shape of :RemoteError
    Q7 — Hermetic / sandbox interaction

    SLICE-PLAN.md not yet created; waits for the design to
    firm up. The arc gets the slice plan when at least Q8,
    Q1, Q2, Q4 have been answered.

  refinement-2026-05-03-multiplexed-channels: |
    User identified the load-bearing protocol decision after
    we returned to RemoteProgram from the kwarg-macros tangent:

    > "the thing i don't know how to handle at all and i think
    > is the largeset unlock... [...] for remote programs... i
    > think we need a transport protocol that delivers stdout
    > and stderr over the 'the stdout' pipe..."

    The asymmetry: threads have stdin/stdout pseudo-pipes +
    in-vm panic catching; processes have real stdin/stdout/
    stderr pipes; REMOTE has only one wire and no stderr-
    equivalent. Without solving this, RemoteProgram is broken
    at the diagnostic boundary.

    User sharpened to a precise contract:

    > "the transport protocol is labelled... when data arrives
    > its either on the Ok channel or the Err channel -- we
    > must model it as a multiplex... the contract is every
    > emission must be declared by the sender as to what kind
    > of emission this is"

    The decision: binary channel discriminator per emission;
    contract enforced (sender MUST label). The wire IS
    Result<T, E> — the type system extends across the boundary
    by construction.

    Per the four questions:
    - Obvious: ✅✅
    - Simple: ✅✅
    - Honest: ✅✅✅ (structural impossibility — emission cannot
      exist without a channel label; the constraint is in the
      type system, not the convention)
    - Good UX: ✅

    SECOND TRIPLE-CHECKMARK on Honest in this design session
    (after auto-kwargs in arc 008). Same shape: structural
    impossibility because the constraint lives in the type
    system, not in convention.

    Diagnostic categories (info / warn / error / panic) live
    IN the E enum, not in the wire protocol. The wire stays
    binary; the language carries categorization.

    User direction on the unlock significance:

    > "http, tls, mtls can all build their nuanced complexity
    > on top of this... the unix domain socket unlocks them all"

    The layering becomes clean:
    - LAYER 3 (typed program) — transport-agnostic
    - LAYER 2 (wire with Ok/Err channel) — transport-agnostic;
      THE LOAD-BEARING PROTOCOL
    - LAYER 1 (transport) — per-tier; only this differs

    Once Unix domain is working, HTTP / HTTPS / mTLS add only
    their transport-specific complexity. Layers 2+3 are written
    ONCE.

    OUTCOME: Q-channel marked ✅ LOCKED in DESIGN.md.
    Bigger-unification potential noted (threads + processes
    benefit from same protocol). Q1-Q8 still open per the
    in-progress design status.

    User direction on capture:
    > "yes - i think we have what we need - http, tls, mtls
    > can all build their nuanced complexity on top of this...
    > the unix domain socket unlocks them all"

  refinement-2026-05-03-syntax-pivot: |
    User pivoted from "answer Q8" to "i was more curious by
    your config forms" — flagged the keyword-arg constructor
    syntax I'd sketched as documentation-shorthand:

    > "i really like this.. idk if wat will accept this now...
    > but we should engineer towards these expressions..."

    Investigation: wat is positional-only at call sites today
    (verified empirically across wat-rs codebase). The
    expressive keyword-arg syntax requires either substrate
    change or a macro layer.

    Conversation explored the macro layer; user saw the
    broader pattern:

    > "this thing accepts inputs and the macro expands into
    > type checking... this'll be a good ux in general?....
    > more things can copy this style?...
    > it means we could drop type declarations entirely while
    > masking the details in macros?..."

    Then deepened it further:

    > "we could make this completely generic... we could have
    > a macro who reads in a function's def and creates a
    > kwarg variant for the user?... the func's form is fully
    > specified?.."

    User direction:

    > "let's get a new arc just on type-less kwargs for
    > function calls... i want this to be something remote
    > program deps on..."

    OUTCOME: arc 008-kwarg-macros opened to capture the
    pattern as a substrate-tier concern. RemoteProgram (this
    arc) explicitly DEPENDS on arc 008. Constructors will be
    auto-generated via :wat::kwargs::auto-kwargs (arc 008
    slice 2) once the underlying typed positional functions
    are defined.

    The auto-generation pattern earned ✅✅✅ on Honest in
    arc 008's four-questions analysis — drift between the
    macro and the function is structurally impossible because
    the function's signature IS the contract; the macro just
    projects.

conventions:
  - filenames: kebab-case .md / UPPER-SNAKE.md for arc roles
  - same shape as 003 / 004 / 005 / 006 (README/INDEX/DESIGN
    [+ SLICE-PLAN later]) for symmetry across consumer-tier
    crate arcs
  - capture user's verbatim direction on the load-bearing
    decisions
  - DESIGN.md uses ✅ CONFIRMED / ❓ OPEN markers for each
    question so the user can scan and react to one at a time
  - inherit conventions from prior arcs (four questions
    discipline, atomicity-and-signal, LLM out until delegate)

