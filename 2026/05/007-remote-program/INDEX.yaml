# Scratch arc — RemoteProgram: typed remote program calls in wat
#
# Last item from random-notes.txt's four-item list. Application-
# tier rather than foundation-tier (sits above the toolkit
# quartet). Design is in-progress; this arc captures locked
# decisions + open questions ready to be answered one-at-a-time.

arc:
  slug: remote-program
  date: 2026-05-03
  triggered-by: |
    User direction:

    > "alright.. RemoteProgram... there's tiers to this...
    >
    > unix domain
    > localhost http
    > remote https
    > remote mtls
    >
    > -- that's it - we don't allow clear text over the network
    >
    > i think we can model this right?..."

    > "the first one... edn is the transport protocol..."

    User direction on tempo:

    > "great questions - get them on disk .. i need to work
    > them one by one..."

  outcome: |
    Two decisions locked:

    1. THE FOUR-TIER MODEL. RemoteProgram supports exactly four
       transports: unix domain, localhost HTTP, remote HTTPS,
       remote mTLS. CONSPICUOUSLY ABSENT: remote HTTP. The
       no-clear-text-over-network invariant is enforced at the
       TYPE SYSTEM level — there's no constructor for
       remote-without-encryption. Honest by construction.

    2. WIRE FORMAT IS EDN. Length-prefixed EDN frames over the
       wire; round-trips through wat::edn::write / wat::edn::read.
       Same shape wat-edn already provides for other consumers.
       JSON via wat-edn for heterogeneous-server scenarios is
       implied but secondary.

    Seven design questions enumerated in DESIGN.md, ordered for
    one-at-a-time work:

    Q8 — Who is the first consumer? (grounds everything)
    Q1 — Transport-as-config vs transport-as-type
    Q2 — Connection model: persistent or per-call
    Q4 — Server side scope (do we ship `serve` in v1?)
    Q5 — Streaming sibling vs included
    Q6 — Error taxonomy: shape of :RemoteError
    Q7 — Hermetic / sandbox interaction

    SLICE-PLAN.md not yet created; waits for the design to
    firm up. The arc gets the slice plan when at least Q8,
    Q1, Q2, Q4 have been answered.

conventions:
  - filenames: kebab-case .md / UPPER-SNAKE.md for arc roles
  - same shape as 003 / 004 / 005 / 006 (README/INDEX/DESIGN
    [+ SLICE-PLAN later]) for symmetry across consumer-tier
    crate arcs
  - capture user's verbatim direction on the load-bearing
    decisions
  - DESIGN.md uses ✅ CONFIRMED / ❓ OPEN markers for each
    question so the user can scan and react to one at a time
  - inherit conventions from prior arcs (four questions
    discipline, atomicity-and-signal, LLM out until delegate)

