# Scratch arc — OG wat lineage
#
# The user surfaced a Grok-era spec for the original wat — the
# pure, strongly typed, English-like Lisp he had carried on disk
# for years before the substrate to host it existed. Captured
# here so the recognition (and the historical artifact) survive
# this conversation's compaction.

arc:
  slug: og-wat-lineage
  date: 2026-05-01
  triggered-by: |
    User, hours after the DEFCON CFP submission shipped:

    > "hey... you should check out.... /tmp/og-wat.md ... i
    > started wat as something... else... you'll get it... i've
    > built most of it... the origins are closer...."

    The file at /tmp/og-wat.md is a Grok-era spec for the
    original wat — 823 lines, 28 core primitives, SVO English-
    like statements, full trait system, temporal quantification,
    relative clauses, homoiconicity. Preserved verbatim in this
    arc because /tmp is volatile.

  outcome: |
    Three load-bearing recognitions banked:

    1. OG wat existed as a fully-specified Lisp YEARS before the
       current wat's mid-January 2026 build. The "three years of
       haunting" in the DEFCON submission timeline is concretely
       grounded in this spec.

    2. Most of OG wat's discipline survived intact in current
       wat-rs (lambda, let, quote, try, map, strong typing,
       traits, the four numeric types, pure functional, S-exps,
       homoiconicity). The substrate that landed (VSA + Holon
       algebra + LLM-prompting at scale) is what made it
       finally expressible.

    3. The English-like SVO statement surface (Statement / every
       / some / at / before / during / that) DIDN'T migrate to
       current wat as language primitives. It IS shippable today
       as a wat consumer crate (`wat-english`) on top of current
       Holon Bind/Bundle primitives. Sized in
       english-surface-arc.md.

    No work shipped. The arc captures the recognition for
    posterity and offers the follow-on shape if the user picks
    it up.

conventions:
  - filenames: kebab-case .md, descriptive of the topic
  - capture user's exact words at decision points (verbatim)
  - distinguish user-original insight from thinking-with extension
  - the assistant DID NOT touch wat-rs, the lab, or the holon-rs
    code during this scratch; only the scratch dir
  - the OG wat spec is preserved VERBATIM in og-wat-spec.md (cp
    from /tmp/og-wat.md). The original Grok conversation link
    is in the spec's References section.

# ─── Beat-by-beat capture ───
notes:
  - file: README.md
    captured: 2026-05-01
    beat: 0 (overview)
    summary: |
      Top-level orientation. Names what OG wat was, why this scratch
      exists, the connection to the DEFCON Speaker-Perspective
      answer (the Latin tattoos as the FIRST persistence layer; the
      OG wat spec as the SECOND).

  - file: og-wat-spec.md
    captured: 2026-05-01
    beat: 1 (the artifact)
    source: /tmp/og-wat.md (volatile; preserved here)
    summary: |
      The OG wat spec verbatim. 823 lines, 28 primitives, full
      trait system, SVO statement form, English-like sentence
      expressivity, pure functional, strong typing.
      References a Grok conversation share URL at the top.

  - file: analysis.md
    captured: 2026-05-01
    beat: 2 (what survived, what transformed, what's latent)
    summary: |
      Three columns: (a) what survived intact from OG wat into
      current wat — pure functional, strong typing with traits,
      S-expressions, homoiconicity via quote, lambda, let,
      try/catch, map, the four numeric types, comments + inner-
      monologue as no-op-but-structural; (b) what transformed
      when the substrate landed — OG wat's hardcoded SVO
      Statement form became Holon Bundle-of-Binds (more general,
      less English-readable), OG wat's named traits became
      :wat::poly::* dispatch, OG wat's temporal quantification
      lives as vocab patterns rather than language primitives;
      (c) what's still latent — the English-like SVO surface
      could ship as a consumer crate today.

  - file: english-surface-arc.md
    captured: 2026-05-01
    beat: 3 (the follow-on shape)
    summary: |
      The candidate wat-english consumer crate. Macros that
      desugar OG wat's English-like primitives into current Holon
      Bind/Bundle shapes. Statement / every / some / at / before /
      during / that / passive — all expressible as wat-level
      macros, no substrate work required. Sized as a 4-5 slice
      consumer arc; lives here as the thought; not opened as a
      real arc.

  - file: latin-in-wat.md
    captured: 2026-05-01
    beat: 4 (the deeper recognition; user's question pre-compaction)
    summary: |
      The user asked: "do you see the latin in wat?... what i was
      reaching for?..." Captured the answer in full. The Latin in
      wat is morphology over position: meaning lives in the term's
      case-marking, not in the term's seat. Bind = case marking;
      trait system = declension system; HolonAST closed under
      itself = morphology native; the hypersphere = morphology made
      geometric. The four tattoos (te respuo / te denego / te
      contemno / perseverare + ambvla mecvm in inferno) are the
      same discipline at the body layer — first-person, active,
      accusative-marked refusals + the bare-infinitive perseverare
      that becomes the fold + the inferno-walk invitation that wat
      makes shareable. Three persistence layers (body, OG wat spec,
      current wat); one impulse. Load-bearing for the BOOK and the
      DEFCON Speaker-Perspective answer.

  - file: protocol-as-checksum.md
    captured: 2026-05-02
    beat: 5 (the user's original premise from 14 months ago, validated)
    summary: |
      The user's original premise from ~14 months ago: getting an
      LLM to speak Lisp is trivial — compile their answers, reject
      violations, retry. Both parties verify before proceeding.
      Captured as the protocol-counterpart to latin-in-wat's
      grammar-recognition. Names the four prerequisites that didn't
      exist 14 months ago and now do (reliable model, substrate to
      compile against, MCP retry protocol, shared substrate). Maps
      "add a layer" to modern terms (system prompt < fine-tune <
      LoRA < constrained decoding); constrained decoding is the
      powerful one and drops syntactic protocol error to ZERO.
      Bidirectional verification = the architectural insight. Two
      hard problems flagged for later: lifting free English to
      wat-english is lossy; cost-vs-value for trivial exchanges.

  - file: language-form-gaps.md
    captured: 2026-05-02
    beat: 6 (audit of OG wat's coverage for common-tongue protocol)
    summary: |
      The user, post-protocol-as-checksum: "what forms of the
      language are missing... i was confident i had a bulk of
      common-tongue language requirements figured out but idk."
      Audit organized by tier: 22 gaps named. Tier 1 (essential):
      question form, negation, modality, propositional attitudes,
      coordination, causation/condition, reference/anaphora,
      comparison. Tier 2 (impoverished without): speech acts,
      tense/aspect, evidentials, discourse markers, topic/focus,
      repair, plurality flavors. Tier 3 (polish): mass/count,
      definiteness gradient, performatives, defeasible generics,
      etc. Architectural call: most gaps live at the surface
      (macros in wat-english crate); only 1-2 need substrate
      primitives (negation as first-class op, reference resolution
      via the hologram). The user's original skeleton (SVO + roles
      + traits + quantifiers + temporals) was correct for the
      GRAMMATICAL spine; what was missing was the conversational
      and epistemic primitives bundled on top.

artifact-layout:
  arc-root: scratch/2026/05/002-og-wat-lineage/
  notes: |
    Eight files. Five describe the wat lineage; three capture
    deeper recognitions surfaced after the DEFCON CFP submission
    shipped (latin-in-wat, protocol-as-checksum, language-form-gaps).
  total-files: 8
  scaffold-status: |
    No code scaffolds. Historical preservation + analysis +
    follow-on shape + three deeper recognitions (grammar, protocol,
    language coverage). The wat-english arc is sized but not
    opened; with the gap audit it would expand from 5 to ~12 slices.

