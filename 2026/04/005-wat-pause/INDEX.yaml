  - date: 2026-05-03
    topic: rename + split — wat-pry → wat-pause; wat-repl extracted as foundation
    triggered-by: |
      User direction (after a sequence of namings; gaze invoked properly):

      > "let's think on what this is.... its a way to pause a program
      > and interrogate it... my usecase will be doing this via an mcp..
      > once we build it... but i'm good with 'wat-mcp' being that..
      > mcp is a generic thing... maybe we just call it repl... but...
      > i don't like that... it needs a name to stand with pry.. maybe
