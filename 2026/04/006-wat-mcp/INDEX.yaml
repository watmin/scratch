# ─── Beat-by-beat capture ───
notes:
  - file: README.md
    captured: 2026-04-29
    beat: 0 (overview)
    summary: |
      Structural sketch + sibling-materials table + the locked
      decisions. Top-level entry point for future readers walking
      back into this scratch. Names the dependency on 005;
      points at the user's central recognition (JSON envelope,
      EDN payload).

  - file: the-collapse.md
    captured: 2026-04-29
    beat: 1 (THE PIVOT)
    follows: README.md
    summary: |
      The user's central insight collapsed the design from
      "translate everything via JSON Schema" to "JSON envelope,
      EDN payload, agent talks wat directly." Eliminates JSON
      Schema generation, per-function tool registration,
      transcoding ceremony, type-boundary mismatch, two systems
      of truth, translation latency. Preserves MCP envelope
      conventions and the substrate's evaluation discipline.
      The user's instinct in lineage: same shape across arcs
      003 / 086 / 103 / 104 — collapse a translation layer into
      the substrate's native form. The agent USES wat; the MCP
      layer is dial-tone.

  - file: one-tool-surface.md
    captured: 2026-04-29
    beat: 2 (the surface)
    follows: the-collapse.md
    summary: |
      The MCP server publishes ONE tool: `wat-eval (msg :String)
      -> :String`. Optional second `wat-eval-stream` for
      break-mode interactions. Three reasons one tool is right:
      (a) composition is what makes wat valuable — the agent
      sends a let-bound multi-step computation as one form;
      per-function tools force N sequential calls, (b) tool list
      stays stable as SymbolTable grows — adding a battery
      doesn't change the tool surface, (c) JSON Schema doesn't
      fit wat's parametric / sum / recursive types cleanly.
      Discovery: agent calls (:wat::pause::ls) and (:wat::pause::show
      :sym) through wat-eval. The substrate's introspection IS
      the API documentation. Five idioms; agent learns wat once;
      every wat-mcp server is reachable through the same
      discipline.

  - file: break-as-notification.md
    captured: 2026-04-29
    beat: 3 (the killer use case)
    follows: one-tool-surface.md
    summary: |
      The user's framed goal: "give the agent a way to run a
      program /and/ live debug it". (:wat::pause::break) already
      exists from 005 slice 2. MCP-mode wraps it: when the break
      fires during a wat-eval-stream call, the substrate sends a
      JSON-RPC notification (with session ID, file/line/col, env
      keys), leaves the original call suspended. Agent makes
      follow-up wat-eval calls referencing the session ID;
      these route to the captured Environment. (:wat::pause::continue)
      releases; original call returns. Special operations:
      :override-return forces a function to return a specific
      value (counterfactual debugging); :eval-in-frame reads
      from any captured frame by index. The agent becomes the
      pause frontend. Three rules; substrate handles the suspended-
      call mechanics. Maybe ~320 lines Rust + ~150 lines wat
      compared to ~5000 for a custom debugger client/server.

  - file: json-prerequisite.md
    captured: 2026-04-29
    beat: 4 (the dependency)
    follows: break-as-notification.md
    summary: |
      The one substrate dependency 006 has beyond 005's work.
      JSON read/write — either a wat-json battery (Path A,
      wraps serde_json) or wat-level parser/writer (Path B).
      Path A wins on practicality — JSON parsing matters
      latency-wise for high-call-count debugging sessions.
      Ships as its own arc (mirrors wat-sqlite); future arcs
      that need JSON inherit. Acceptance bar before opening
      006: round-trip read/write works; polymorphic typed read
      works; ~50 lines wat-tests cover edge cases.

  - file: gating.md
    captured: 2026-04-29
    beat: 5 (the constraint)
    follows: json-prerequisite.md
    summary: |
      Same Path B (freeze-time rejection) gating mechanism as
      005-wat-pause. --mcp flag mirrors --pause. Both batteries can
      coexist (--pause --mcp loads both); MCP wins entry-point
      lookup if both set. Gate matrix: no flag → :user::main;
      --pause alone → :wat::pause::main (rustyline); --mcp alone →
      :wat::mcp::main (JSON-RPC); --pause --mcp → :wat::mcp::main
      with pause primitives loaded. Production deployments without
      flags don't host pause or mcp surfaces — opt-in by flag.
      Composes with arc 100's wat_cli::run(&[Battery]); custom
      consumers add the mcp battery to their own CLIs by the
      same pattern.

  - file: use-cases.md
    captured: 2026-04-29
    beat: 6 (what unlocks)
    follows: gating.md
    summary: |
      Five concrete shapes 006 enables: (1) agent-driven
      debugging via break-as-notification, (2) agent-driven
      library exploration through wat introspection, (3)
      multi-program orchestration with the agent as conductor,
      (4) self-hosted agent loops (wat program calls Claude
      API, uses other wat programs as tools), (5) production
      interactive control planes via TCP attach. Each is hard
      today because the substrate's capabilities aren't exposed
      to agents through a uniform protocol; 006 is the small
      layer that exposes all five. The trading lab's BOOK
      chapters 49 / 51 / 54 / 55 / 65 / 67 keep pointing at
      patterns that compose into wat-as-agent-Lisp; tonight
      named that the agent is the consumer the substrate has
      been building for.

  - file: relation-to-005.md
    captured: 2026-04-29
    beat: 7 (the dependency map)
    follows: use-cases.md
    summary: |
      Names which 005 primitives 006 reuses (break-with-stdio,
      Environment capture, FrameInfo::env, ls/show/completions,
      where/frames, last-error, wat/std/pause.wat patterns) and
      what 006 adds (wat-json dep, session registry, MCP
      dispatch, override-return, eval-in-frame). Slicing
      dependency: 005-1 → 005-2 → wat-json → 006-1 → 006-2.
      005's slice 3 (rustyline) and 006's slice 1+2 are
      independent; ship in any order. The user's pattern
      across arcs 099-104, 005, 006 is consistent: each is a
      thin overlay on substrate that already exists; none
      introduces new architecture. Lean: keep 005 and 006 as
      separate scratches; they share machinery, they don't
      share purpose.

  - file: slice-plan.md
    captured: 2026-04-29
    beat: 8 (the build order)
    follows: relation-to-005.md
    summary: |
      Four slices. Prerequisite: wat-json arc (3-4 days). Slice
      1: basic MCP eval (3-4 days; depends on 005-1). Slice 2:
      break-as-notification (3-4 days; depends on 005-2 + 006-1).
      Slice 3: counterfactual primitives — override-return,
      eval-in-frame (2-3 days; depends on 006-2). Slice 4
      (deferred): TCP attach for remote MCP (4-6 days;
      production deployment work, security concerns). First
      three slices: ~7-9 days for full agent-driven debugging
      experience over local stdio. Critical path with 005:
      ~15-20 days for both pause experiences + their core
      debugging features.

  - file: open-questions.md
    captured: 2026-04-29
    beat: 9 (the unresolved)
    follows: slice-plan.md
    summary: |
      13 open questions categorized: protocol-level (4) — single
      vs two tools, request id semantics for paused calls,
      cancellation semantics, initialize capabilities — agent
      experience (3) — error response shape, large result
      handling, pretty-printing — security/production (3) —
      TLS/auth for TCP attach, sandboxed evaluation, audit
      logging — UX/discoverability (3) — multi-line input, tool
      description content, diagnostic notifications. Most have
      leans documented; resolution is "first slice that surfaces
      the question." Question #8 (TLS/auth for TCP attach) is
      the biggest unknown — real production work — and may
      need its own architectural arc beyond just 006. None
      block opening the wat-rs arc once 005's prerequisites are
      met.

