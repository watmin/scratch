      Mechanical rename. No design changes. Original 006 design
      stays valid; substrate primitives now live under :wat::pause::
      instead of :wat::pry::.

  - date: 2026-05-03
    topic: architectural reframe — wat-mcp = wat-http-api-server instance
    triggered-by: |
      Per the conversation that opened arcs 009-016 (HTTP layer +
      schema + spec-driven API), the user recognized:

      > "so.... did we just satisfy the ground constraints to build
      > the mcp?... we need the http server+client router, api-spec
      > +client,server?...
      >
      > if we deliver these... we can satisfy an mcp on loopback that
      > we could plug into yourself?..."

      And after assistant walked through the implications:

      > "i say we refine the mcp idea with our http foundations
      > being better understood and we add if necessary we capture
      > a new arc..."

    captured: |
      THE REFRAME:

      The original 006 design (2026-04-29) used the pipe protocol +
      JSON envelopes (the only transport options the substrate
      had at the time). With arcs 009-016 in scratch, wat-mcp can
      be implemented MUCH more cleanly:

        wat-mcp = a wat-http-api-server instance whose spec is the
                  MCP protocol encoded as a wat-http-api-spec

      Concretely:

        ;; The MCP protocol IS a spec
        (:wat::http::api::spec::define :wat::mcp::spec
          (:operation :tools/list ...)
          (:operation :tools/call
            :input  (:shape (:name :string)
                            (:arguments :HolonAST))
            :output (:status 200 :body :ToolResult)
            :errors [:ToolNotFound :BadArguments :ToolError])
          (:operation :resources/list ...)
          (:operation :resources/read ...)
          (:operation :prompts/list ...)
          (:operation :prompts/get ...))

        ;; wat-mcp uses wat-http-api-server to serve this spec
        (:wat::http::api::server::generate :wat::mcp::server
          :spec :wat::mcp::spec)

        ;; User extends with their own tool handlers
        (:wat::http::api::server::define-handler
          :wat::mcp::server :tools/call
          ...dispatch by tool name...)

      WHAT THIS REFRAME GIVES US:

      1. Schema validation on every MCP request/response (via arc 013
         wat-schema; positive security at the boundary)
      2. Auto-generated routes for the standard MCP tool surface
      3. Consistent error envelope (matches JSON-RPC error shape)
      4. Auth middleware (the spec declares :auth; the server enforces;
         needed for production MCP deployments where multiple agents
         attach)
      5. Drift impossibility: any wat-http-api-client (used by Claude or
         any MCP client) compiles against the same spec; client and
         server cannot drift in shape
      6. The two protocols on the same handler property (arc 009):
         JSON-RPC over HTTP for standard MCP clients; native EDN
         envelope for wat-network peers; same handler

      THE TWO MODES THE USER NAMED:

      Mode A — Pure sandbox eval (zero IO; pure functions)

        wat-mcp's `wat-eval` tool runs the form in a sandboxed
        wat-vm. NO IO syscalls (network; filesystem; clock;
        randomness). Pure functions only. Bounded compute.

        This needs a wat-rs SUBSTRATE QUESTION: does wat-vm
        support a capability-restricted "no IO" mode? If not,
        that's a separate substrate arc to open. The pure-eval-
        via-MCP vision depends on this capability.

      Mode B — Full IO with spec validation

        wat-mcp tool handlers can do anything wat can do; schema
        on each tool's input/output catches bad shapes at the
        boundary. This is the original 006 design, now with
        proper schema enforcement (arc 013) instead of ad-hoc
        validation.

      THE LARGER RECOGNITION:

      "Wat all the way down" — homoiconicity from protocol to eval.
      Transport = HTTP. Protocol envelope = MCP (JSON-RPC).
      Spec = wat (using wat-http-api-spec). Server = wat (using
      wat-http-api-server). Validation = wat (using wat-schema).
      Eval target = wat (in wat-vm). Result = wat (HolonAST).

      Claude becomes a programmer of the wat-vm in real time.
      Not generating text that gets parsed; not generating Rust
      that gets compiled. Generating wat ASTs that get evaluated.
      The LLM IS the live programmer; wat-vm IS the live runtime;
      MCP IS the wire.

      This was already captured as a beat in 005-wat-pause/INDEX
      (the MCP / Claude-as-measurer vision). This captured-beat
      is the implementation-side companion: how the substrate's
      design actually delivers that vision once arcs 009-016 land.

