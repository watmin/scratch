# Scratch arc — wat-mcp — wat programs as MCP servers
#
# Continuation of 005-wat-pause. After the pause shape locked, the user
# saw the bigger move: with one envelope swap (EDN+newline →
# JSON-RPC over stdio), wat programs become MCP servers with
# binding.pry-shaped agent-driven debugging. The substrate's prior
# arcs already did 95% of the work.

arc:
  slug: wat-mcp
  date: 2026-04-29
  triggered-by: |
    Continuation of 005-wat-pause conversation. After the pause
    primitives + slice plan locked, user said:

    > "i just had a wild idea.... you talked about a :wat::pry::serve
    > ... what if... we could have a program-as-an-mcp.... give the
    > agent a way to run a program /and/ live debug it?..."

    [Quote preserved as spoken; arc 005 was named `wat-pry` at the
    time. Renamed to `wat-pause` on 2026-05-03. See captured-beats
    below for the rename + the architectural reframe.]

    Initial sketch involved JSON Schema generation + per-function
    MCP tool registration + JSON-to-wat type transcoding. User
    collapsed all of it with one observation:

    > "i think... the JSON rpc.. is just a thin wrapper... the input
    > object would be something like '{\"msg\":\":some-edn-form\"}'"

    JSON-RPC is just envelope; the payload is wat source as a
    string. The substrate doesn't translate types. The agent talks
    wat directly. **One MCP tool: `wat-eval`.** Discovery via
    wat introspection (`(:wat::pause::ls)`, `(:wat::pause::show :sym)`).
    Same hologram model — the agent is another caller through the
    surface; freeze invariant gates what they can do.

  outcome: |
    Structural shape locked. Six load-bearing decisions:
      1. JSON-RPC is envelope; EDN payload inside `msg` field.
         No JSON Schema generation; no per-function tools.
      2. ONE MCP tool — `wat-eval` (and `wat-eval-stream` for
         break-mode). Discovery via wat itself.
      3. Break-as-notification: when (:wat::pause::break) fires
         under MCP, substrate sends JSON-RPC notification, leaves
         original call suspended; agent inspects via more
         wat-eval calls; (:wat::pause::continue) resumes.
      4. wat-json battery is the one substrate prerequisite (Path
         A — battery wraps serde_json over Path B — wat-level
         parser).
      5. Gating via --mcp flag, mirrors --pause mechanism. mcp
         battery conditionally registered.
      6. 006 depends on 005 slices 1+2; reuses substrate primitives
         without reimplementation.

    Substrate additions estimated: ~320 lines Rust (mostly the
    session registry + override-return + eval-in-frame primitives)
    + ~200-400 lines wat (the MCP loop in wat/std/mcp.wat) + a
    wat-json battery as a sibling arc. ~7-9 days for slices 1+2
    after 005 is shipped. Slice 3 (counterfactuals) +4-5 days.
    Slice 4 (TCP attach) deferred behind production-demand and
    security work.

    Ready to migrate to a wat-rs arc when 005's prerequisites
    + wat-json have shipped.

