  - file: lattice-bounded-infinities.md
    captured: 2026-04-26
    summary: |
      Tangent-spheres become a LATTICE when you zoom out. Atoms are
      discrete labels (lattice points); interiors are bounded
      infinities between them. Integer N is reframed as a NAME for
      a region (e.g. cell-2 = (1,2)) rather than a point. Every
      vector has two answers: cell-membership (discrete) and
      position-within-cell (continuous). cos = bias toward each
      edge; tan = boundary between cells. This IS the geometry
      scalar encoding already runs on — user is naming what was
      already there. Generalization: any concept-space with
      neighbors is a lattice.
    status: captured-raw
