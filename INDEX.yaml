  - file: lattice-as-hashmap.md
    captured: 2026-04-26
    summary: |
      The lattice doesn't care what the labels ARE. Integers were
      one INSTANCE; strings/UUIDs/symbols are equally lattice points.
      Token-labels generalize the lattice into a namespace.
      bundle("foo","baz") implements SET membership: bias=present,
      tan=absent. Bind+bundle implements HASH-MAP: pair each key
      with its value, query by unbind. Same lattice, one extra
      rotation per entry. Library's role-filler binding, encoder.py,
      EngramLibrary — all running on this geometry. User is naming
      what was already there.
    status: captured-raw
