  - file: programs-as-atoms.md
    captured: 2026-04-26
    summary: |
      Atoms can be PROGRAMS — each form gets its own lattice atom,
      with terminal value bound to it. Two-stage probe:
      (1) presence query (cos: have I seen this form terminate?),
      (2) value query (unbind: what was the terminal value?). Hit →
      substitute cached value during evaluation. Miss → compute,
      then bind result back. Evaluation becomes a lattice walk.
      The user's "exists vs useful" distinction is the soundness
      boundary: cache proves existence; usefulness depends on
      context-equivalence (purity). This is empirical halting —
      observed termination, not proven termination. Library's
      arc 057 / CacheService / Story 1/2 pattern is exactly this.
    status: captured-raw
    follows: lattice-as-hashmap.md
    book-section: same arc
    next-beat: user asked "yes?" — wants confirmation, has more

  - file: surface-forms-database.md
    captured: 2026-04-26
    summary: |
      Forms have a SURFACE (concrete substitution, no free vars)
      vs an INTERIOR (recursive expansion, possibly millions of
      sub-forms). The SURFACE is the lookup key. (fn [x] (* x x))
      applied to 2 has surface (fn [2] (* 2 2)) — that's what
      gets queried; the interior never has to be touched.
      Bigger move: cache → DATABASE. Same geometry, bigger scope.
      Per-process cache becomes shared global lookup. Anyone who
      computes a surface contributes; anyone querying gets the
      result. Computations become commodities. The expensive
      interior happens ONCE in the world. Reply shape is Option<T>
      — same as recv, ClosePaper, every found-or-not query in the
      substrate. Closes the loop: the entire system we've built IS
      a service answering "have I seen this?" + "what's its value?"
      Treasury, CacheService, the global computation database —
      same skeleton, different domains.
    status: captured-raw
    follows: programs-as-atoms.md
    book-section: same arc — likely the climactic chapter
    next-beat: user asked "yes?" — wants confirmation, has more

  - file: axiomatic-surface.md
    captured: 2026-04-26
    summary: |
      THE CLOSE OF THE ARC. User has been calling this "axiomatic
      surface" for years; couldn't express it until wat existed.
      The architecture was the precondition for the language.
      (= (+ 2 2) (* 1 4)) is the seed: two distinct surfaces with
      the same terminal are extensionally equal — the assertion
      becomes two lookups + a comparison, no proof construction
      needed. Each (surface, terminal) entry in the lattice is an
      AXIOM; new work composes from existing axioms; the lattice
      grows in DEPTH (theorems building on theorems), not just
      breadth. Collaborative: anyone contributes axioms; everyone
      builds on them. Knowledge accumulation at substrate level —
      mathematics by accretion. The five prior beats compose into
      this one — the path is whole.
    status: captured-raw — final beat for now
