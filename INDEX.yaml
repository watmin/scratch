  - file: principia-and-the-lattice.md
    captured: 2026-04-26
    summary: |
      ADDENDUM to axiomatic-surface. User recognized the lineage:
      Russell/Whitehead's Principia, Hilbert's program, Gödel's
      incompleteness, Turing's halting problem. The lattice rhymes
      hard with what Hilbert wanted but corrects it via the lessons
      of Gödel and Turing — by ABANDONING absolute claims.
      Open vs closed, empirical vs absolute, distributed vs
      centralized. Modern proof assistants (Coq, Lean, Agda) are
      the surviving descendants of the Hilbert dream; the lattice
      is a third path — content-addressable empirical mathematics.
      Significance for the book: the wat machine is articulated
      as the substrate Hilbert wanted, with the corrections Gödel
      and Turing's failures earned.
    status: captured-raw — addendum, not a new beat
